<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630" role="img" aria-labelledby="title desc">
  <title id="title">GPU LLM Benchmark</title>
  <desc id="desc">Image de partage du site GPU LLM Benchmark.</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#06101d"/>
      <stop offset="0.6" stop-color="#0b1830"/>
      <stop offset="1" stop-color="#030712"/>
    </linearGradient>
    <linearGradient id="frame" x1="140" y1="96" x2="364" y2="320" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#7cf2ff"/>
      <stop offset="0.55" stop-color="#4ade80"/>
      <stop offset="1" stop-color="#fb7185"/>
    </linearGradient>
    <linearGradient id="signal" x1="188" y1="280" x2="336" y2="188" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#7cf2ff"/>
      <stop offset="1" stop-color="#8b5cf6"/>
    </linearGradient>
    <linearGradient id="badge" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#7cf2ff"/>
      <stop offset="1" stop-color="#4ade80"/>
    </linearGradient>
  </defs>

  <rect width="1200" height="630" fill="url(#bg)"/>
  <circle cx="1020" cy="126" r="150" fill="#7c3aed" opacity=".16"/>
  <circle cx="1030" cy="520" r="220" fill="#0ea5e9" opacity=".12"/>
  <circle cx="186" cy="120" r="140" fill="#22c55e" opacity=".1"/>

  <rect x="140" y="96" width="224" height="224" rx="54" fill="#07111f" stroke="url(#frame)" stroke-width="8"/>
  <rect x="182" y="150" width="140" height="116" rx="28" fill="#0d1830" stroke="#c6f7ff" stroke-opacity=".18" stroke-width="3"/>
  <rect x="210" y="178" width="52" height="34" rx="10" fill="#22c55e"/>
  <circle cx="286" cy="189" r="12" fill="#fbbf24"/>
  <circle cx="286" cy="233" r="12" fill="#fb7185"/>
  <path d="M190 244h24l18-34 24 22 32-52 14 30h28" fill="none" stroke="url(#signal)" stroke-linecap="round" stroke-linejoin="round" stroke-width="10"/>

  <text x="428" y="212" fill="#9ff7ff" font-size="32" font-weight="700" font-family="Inter, Arial, sans-serif" letter-spacing=".24em">
    GPU LLM
  </text>
  <text x="428" y="290" fill="#edf2ff" font-size="76" font-weight="800" font-family="Inter, Arial, sans-serif">
    Benchmark
  </text>
  <text x="428" y="352" fill="#9eb1d1" font-size="30" font-weight="500" font-family="Inter, Arial, sans-serif">
    Comparez des cartes réelles, leurs benchmarks mesurés
  </text>
  <text x="428" y="398" fill="#9eb1d1" font-size="30" font-weight="500" font-family="Inter, Arial, sans-serif">
    et leur historique de prix pour choisir le bon GPU LLM.
  </text>

  <rect x="428" y="454" width="274" height="56" rx="28" fill="#ffffff10" stroke="#ffffff1c"/>
  <text x="462" y="490" fill="url(#badge)" font-size="25" font-weight="700" font-family="Inter, Arial, sans-serif">
    REAL BENCHMARK DATA
  </text>

  <text x="428" y="548" fill="#d1d9f0" font-size="25" font-weight="600" font-family="Inter, Arial, sans-serif">
    gpubenchmark.jon-dev.fr
  </text>
</svg>
